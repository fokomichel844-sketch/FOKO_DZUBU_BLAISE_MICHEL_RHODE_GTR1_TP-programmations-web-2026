<!DOCTYPE html> <!-- Indique au navigateur que ce document utilise HTML5 -->
<html lang="fr"> <!-- Ouvre la page HTML et précise que la langue principale est le français -->
<head> <!-- Ouvre la partie contenant les informations techniques de la page -->
    <link rel="stylesheet" href="styles.css"> <!-- Permet de lier le fichier CSS à la page HTML -->
    <meta charset="UTF-8"> <!-- Permet d’afficher correctement les accents et caractères spéciaux -->
    <title>Accueil - Mon mini-site</title> <!-- Définit le titre affiché dans l’onglet du navigateur -->
</head> <!-- Ferme la partie head -->

<body> <!-- Ouvre la partie visible de la page -->
    <header> <!-- Définit l'en-tête du site -->
        <h1>Mon mini-site web</h1> <!-- Affiche le titre principal -->
    </header> <!-- Ferme l'en-tête -->
    <nav> <!-- Définit la barre de navigation -->
        <a href="index.html">Accueil</a> <!-- Lien vers la page d'accueil -->
        <a href="presentation.html">Présentation</a> <!-- Lien vers la page de présentation -->
        <a href="contact.html">Contact</a> <!-- Lien vers la page de contact -->
    </nav> <!-- Ferme la barre de navigation -->
    <div class="container"> <!-- Conteneur principal qui sera utilisé avec Flexbox -->
        <main> <!-- Zone principale de contenu -->
            <h2>Bienvenue</h2> <!-- Titre de la section principale -->
            <p>Ce site a été amélioré avec Flexbox pour une meilleure organisation.</p> <!-- Description -->
        </main> <!-- Ferme la zone principale -->
        <aside> <!-- Barre latérale -->
            <h2>Informations</h2> <!-- Titre de la barre latérale -->
            <p>Cette zone peut contenir des informations supplémentaires.</p> <!-- Contenu secondaire -->
        </aside> <!-- Ferme la barre latérale -->
    </div> <!-- Ferme le conteneur principal -->
    <footer> <!-- Pied de page -->
        <p>© 2026 - Mon mini-site</p> <!-- Texte du pied de page -->
    </footer> <!-- Ferme le pied de page -->
</body> <!-- Ferme la page -->
    

</html>
